quarkus:
  devservices:
    enabled: false
  live-reload:
    enabled: true
  otel:
    logs:
      enabled: true
    traces:
      enabled: true
    exporter:
      otlp:
        endpoint: http://localhost:14317
  langchain4j:
    ollama:
      base-url: http://127.0.0.1:11434
      timeout: 60s
      chat-model:
        model-id: qwen3:1.7b
        temperature: 0.7
      embedding-model:
        model-id: qwen3-embedding:8b
  http:
    host: 0.0.0.0
    static-dir:
      endpoint: composeResources
      path: uiResources/composeResources
    cors:
      enabled: true
      origins:
        - http://localhost:8080
        - http://127.0.0.1:8080
rag:
  max-results: 6
  min-score: 0.75
  expanding-query-template: |
    Gera {{n}} versões diferentes EM PORTUGUÊS DE PORTUGAL de uma dada pergunta do utilizador.
    Cada versão deve ser redigida de forma diferente, usando sinónimos ou estruturas de frase alternativas,
    mas todas devem manter o significado original.
    Estas versões serão usadas para recuperar documentos relevantes.
    É muito importante fornecer cada versão da query em uma linha separada,
    sem enumerações, hífens ou qualquer formatação adicional!
    Pergunta do utilizador: {{query}}"
  qdrant:
    host: 127.0.0.1
    api-key: iLUhRXjvzDCxuDLQVa6arrl5J4A2qw6bRP0p06Euj2sAwqq9lpEsCoPU0vuDuGHk
    collection:
      name: pessoa_texts

pessoa:
  url: http://127.0.0.1:8080

