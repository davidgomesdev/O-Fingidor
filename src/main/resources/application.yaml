quarkus:
  devservices:
    enabled: false
  live-reload:
    enabled: true
  otel:
    logs:
      enabled: true
    traces:
      enabled: true
    exporter:
      otlp:
        endpoint: http://localhost:14317
  http:
    host: 0.0.0.0
    static-dir:
      endpoint: composeResources
      path: uiResources/composeResources
    cors:
      enabled: true
      origins:
        - http://localhost:8080
        - http://127.0.0.1:8080
        # Dev Compose JS
        - http://localhost:8081
        - http://127.0.0.1:8081

model:
  # options: ollama, anthropic
  name: ollama
  ollama:
    base-url: http://127.0.0.1:11434
    timeout: 600s
    chat-model:
      model-id: qwen3:1.7b
      temperature: 0.7
      thinking: false
    embedding-model:
      model-id: qwen3-embedding:8b
  anthropic:
    timeout: 60s
    api-key: REPLACE_ME
    chat-model:
      # options (api alias): https://platform.claude.com/docs/en/about-claude/models/overview#latest-models-comparison
      model-id: claude-haiku-4-5
      temperature: 0.7
      thinking: true
      max-tokens: 50000

rag:
  max-results: 6
  min-score: 0.75
  expand-query: false
  # Ingest 25 documents at a time
  ingestion-chunk-size: 25
  expanding-query-template: |
    Gera {{n}} versões diferentes EM PORTUGUÊS DE PORTUGAL de uma dada pergunta do utilizador.
    Cada versão deve ser redigida de forma diferente, com um objetivo claro, usando sinónimos ou estruturas de frase alternativas, mas todas devem manter o significado original.
    Estas versões serão usadas para recuperar documentos relevantes.
    Cada versão da query deve estar numa linha separada.
    Não uses enumerações, hífens ou qualquer formatação adicional.
    Pergunta do utilizador: {{query}}
  qdrant:
    host: 127.0.0.1
    api-key: iLUhRXjvzDCxuDLQVa6arrl5J4A2qw6bRP0p06Euj2sAwqq9lpEsCoPU0vuDuGHk
    collection:
      name: pessoa_texts

pessoa:
  url: http://127.0.0.1:8080
