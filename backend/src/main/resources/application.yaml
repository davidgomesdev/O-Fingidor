quarkus:
  devservices:
    enabled: false
  live-reload:
    enabled: true
  otel:
    logs:
      enabled: true
    traces:
      enabled: true
    exporter:
      otlp:
        endpoint: http://localhost:14317
  http:
    host: 0.0.0.0
    cors:
      enabled: true
      origins:
        - http://localhost:8080
        - http://127.0.0.1:8080
        # Dev Compose JS
        - http://localhost:8081
        - http://127.0.0.1:8081
  vertx:
    max-event-loop-execute-time: 120s
  datasource:
    db-kind: postgresql
    username: pessoa
    password: pessoa
    jdbc:
      url: jdbc:postgresql://127.0.0.1:5432/pessoa
  hibernate-orm:
    database:
      generation: none
  flyway:
    migrate-at-start: true
model:
  # options: ollama, anthropic
  name: ollama
  ollama:
    base-url: http://127.0.0.1:11434
    timeout: 600s
    chat-model:
      model-id: qwen3:1.7b
      temperature: 0.7
      thinking: false
    embedding-model:
      model-id: qwen3-embedding:8b
  anthropic:
    timeout: 60s
    api-key: REPLACE_ME
    chat-model:
      # options (api alias): https://platform.claude.com/docs/en/about-claude/models/overview#latest-models-comparison
      model-id: claude-haiku-4-5
      temperature: 0.7
      thinking: true
      max-tokens: 50000

rag:
  max-results: 10
  min-score: 0.75
  expand-query: false
  ingestion-chunk-size: 5
  expanding-query-template: |
    Gera {{n}} versões diferentes EM PORTUGUÊS DE PORTUGAL da seguinte pergunta, para recuperar textos relevantes sobre Fernando Pessoa, os seus heterónimos e obra.
    Cada versão deve explorar um ângulo diferente: temático, biográfico, filosófico, poético ou literário.
    Quando relevante, usa nomes de heterónimos (Alberto Caeiro, Álvaro de Campos, Ricardo Reis, Bernardo Soares), títulos de obras ou vocabulário literário português da época.
    Mantém o sentido original mas varia vocabulário e estrutura para maximizar cobertura de recuperação.
    Cada versão numa linha separada. Sem enumerações, hífens ou formatação adicional.
    Pergunta: {{query}}
  qdrant:
    host: 127.0.0.1
    api-key: iLUhRXjvzDCxuDLQVa6arrl5J4A2qw6bRP0p06Euj2sAwqq9lpEsCoPU0vuDuGHk
    collection:
      name: pessoa_texts
  semantic-chunking:
    enabled: true
    similarity-threshold: 0.7
    min-chunk-size: 100
    max-chunk-size: 1000

pessoa:
  url: http://127.0.0.1:8080

session:
  jwt:
    secret: REPLACE_ME_WITH_A_STRONG_SECRET_AT_LEAST_32_CHARS
    ttl: PT1H
  memory:
    max-messages: 20

